<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | Student Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif;}
    body{background:#f0f2f5;display:flex;justify-content:center;align-items:center;height:100vh;}
    .auth-box{background:rgba(255,255,255,0.9);padding:40px;border-radius:15px;box-shadow:0 20px 50px rgba(0,0,0,0.1);width:400px;}
    h2{text-align:center;margin-bottom:20px;color:#8f2c24;}
    input{width:100%;padding:12px;margin-bottom:15px;border-radius:5px;border:1px solid #ccc;font-size:1em;}
    input[type="submit"]{background:#8f2c24;color:white;border:none;cursor:pointer;transition:0.3s;}
    input[type="submit"]:hover{background:#d64c42;}
    .switch{text-align:center;margin-top:10px;}
    .switch a{color:#8f2c24;text-decoration:underline;cursor:pointer;}
  </style>
</head>
<body>

<div class="auth-box" id="authBox">
  <h2 id="authTitle">Login</h2>
  <input type="text" id="username" placeholder="Username" />
  <input type="password" id="password" placeholder="Password" />
  <input type="submit" id="btnAuth" value="Login" />
  <div class="switch">
    <span id="switchText">Don't have an account? </span><a id="switchLink">Signup</a>
  </div>
</div>

<script>
const authTitle = document.getElementById('authTitle');
const btnAuth = document.getElementById('btnAuth');
const switchLink = document.getElementById('switchLink');
const switchText = document.getElementById('switchText');
let isLogin = true; // toggle login/signup

switchLink.addEventListener('click', () => {
  isLogin = !isLogin;
  if(isLogin){
    authTitle.innerText = "Login";
    btnAuth.value = "Login";
    switchText.innerText = "Don't have an account? ";
    switchLink.innerText = "Signup";
  } else {
    authTitle.innerText = "Signup";
    btnAuth.value = "Signup";
    switchText.innerText = "Already have an account? ";
    switchLink.innerText = "Login";
  }
});

btnAuth.addEventListener('click', () => {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if(!username || !password){
    alert("Please enter username and password.");
    return;
  }

  const users = JSON.parse(localStorage.getItem('users')) || {};

  if(isLogin){
    // LOGIN
    if(!users[username] || users[username].password !== password){
      alert("Invalid username or password.");
      return;
    }
    alert(`Welcome back, ${users[username].fullName || username}!`);
    localStorage.setItem('loggedInUser', JSON.stringify(users[username]));
    localStorage.setItem('authenticated','true');
    window.location.href = "dashboard.html"; // redirect
  } else {
    // SIGNUP
    if(users[username]){
      alert("Username already exists. Please login.");
      return;
    }
    const fullName = prompt("Enter your full name:") || username;
    const role = prompt("Enter role (student/faculty/admin):") || "student";
    users[username] = {username,password,fullName,role};
    localStorage.setItem('users', JSON.stringify(users));
    alert("Signup successful! You can now login.");
    // switch to login
    isLogin = true;
    authTitle.innerText = "Login";
    btnAuth.value = "Login";
    switchText.innerText = "Don't have an account? ";
    switchLink.innerText = "Signup";
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
  }
});
</script>

</body>
</html>
