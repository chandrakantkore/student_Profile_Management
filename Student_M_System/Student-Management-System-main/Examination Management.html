<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Examination Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<style>
#toast-container{position:fixed;top:1rem;right:1rem;z-index:1000;}
.toast{background-color:#38a169;color:white;padding:.75rem 1.25rem;margin-bottom:.5rem;border-radius:.375rem;box-shadow:0 2px 6px rgba(0,0,0,.15);animation:fadeinout 3s forwards;}
@keyframes fadeinout{0%{opacity:0;transform:translateX(50%);}10%,90%{opacity:1;transform:translateX(0);}100%{opacity:0;transform:translateX(50%);}}
</style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<header class="bg-blue-700 text-white p-4 shadow-md flex justify-between items-center">
<h1 class="text-2xl font-semibold">Examination Management</h1>
<div>
<button id="exportCSVBtn" class="bg-green-600 hover:bg-green-700 px-3 py-1 rounded mr-2">Export CSV</button>
<button id="exportPDFBtn" class="bg-purple-600 hover:bg-purple-700 px-3 py-1 rounded">Export PDF</button>
</div>
</header>

<main class="flex-grow max-w-7xl mx-auto p-4">
<div id="accessDenied" class="hidden bg-red-200 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
You do not have permission to access this module.
</div>

<section id="formSection" class="mb-6 hidden bg-white p-6 rounded shadow">
<h2 class="text-xl font-semibold mb-4">Add / Edit Examination Record</h2>
<form id="examForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
<div><label class="block mb-1 font-medium">Student ID</label><input id="studentIdInput" type="text" placeholder="Enter Student ID" required class="w-full border rounded px-3 py-2"></div>
<div><label class="block mb-1 font-medium">Subject</label><input id="subjectInput" type="text" placeholder="Enter Subject" required class="w-full border rounded px-3 py-2"></div>
<div><label class="block mb-1 font-medium">Marks</label><input id="marksInput" type="number" min="0" max="100" placeholder="0-100 or blank if Absent" class="w-full border rounded px-3 py-2"></div>
<div><label class="block mb-1 font-medium">Date</label><input id="dateInput" type="date" required class="w-full border rounded px-3 py-2"></div>
<div class="md:col-span-4 flex justify-end gap-3 mt-2">
<button type="submit" id="submitBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded font-semibold">Add Record</button>
<button type="button" id="cancelEditBtn" class="bg-gray-300 hover:bg-gray-400 text-gray-700 px-5 py-2 rounded font-semibold hidden">Cancel</button>
</div>
</form>
</section>

<section class="mb-6 bg-white p-6 rounded shadow grid grid-cols-1 md:grid-cols-3 gap-4">
<div><label class="block mb-1 font-medium">Filter by Student ID</label><input id="filterStudentId" type="text" class="w-full border rounded px-3 py-2"></div>
<div><label class="block mb-1 font-medium">Filter by Subject</label><input id="filterSubject" type="text" class="w-full border rounded px-3 py-2"></div>
<div><label class="block mb-1 font-medium">Filter by Date</label><input id="filterDate" type="date" class="w-full border rounded px-3 py-2"></div>
</section>

<section class="mb-6 bg-white p-6 rounded shadow overflow-x-auto">
<table id="examTable" class="min-w-full table-auto border-collapse border text-left">
<thead class="bg-blue-100">
<tr>
<th class="border px-4 py-2">Student ID</th>
<th class="border px-4 py-2">Subject</th>
<th class="border px-4 py-2">Marks</th>
<th class="border px-4 py-2">Date</th>
<th id="actionHeader" class="border px-4 py-2 hidden">Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section class="bg-white p-6 rounded shadow">
<div class="flex justify-between items-center mb-4">
<h2 class="text-xl font-semibold">Marks Distribution Chart</h2>
<select id="chartType" class="border rounded px-3 py-2">
<option value="bar">Bar</option>
<option value="line">Line</option>
<option value="pie">Pie</option>
<option value="radar">Radar</option>
</select>
</div>
<canvas id="marksChart" style="height:320px;"></canvas>
<div id="analytics" class="mt-6 text-gray-700"></div>
</section>
</main>

<div id="toast-container"></div>

<script>
(() => {
const userRole = localStorage.getItem('userRole') || "faculty";

const accessDeniedEl = document.getElementById("accessDenied");
const formSection = document.getElementById("formSection");
const examForm = document.getElementById("examForm");
const submitBtn = document.getElementById("submitBtn");
const cancelEditBtn = document.getElementById("cancelEditBtn");

const studentIdInput = document.getElementById("studentIdInput");
const subjectInput = document.getElementById("subjectInput");
const marksInput = document.getElementById("marksInput");
const dateInput = document.getElementById("dateInput");

const filterStudentIdInput = document.getElementById("filterStudentId");
const filterSubjectInput = document.getElementById("filterSubject");
const filterDateInput = document.getElementById("filterDate");

const examTableBody = document.querySelector("#examTable tbody");
const actionHeader = document.getElementById("actionHeader");

const exportCSVBtn = document.getElementById("exportCSVBtn");
const exportPDFBtn = document.getElementById("exportPDFBtn");

const chartTypeSelector = document.getElementById("chartType");
const marksChartCtx = document.getElementById("marksChart").getContext("2d");
const analyticsEl = document.getElementById("analytics");
const toastContainer = document.getElementById("toast-container");

let exams = JSON.parse(localStorage.getItem("examsData") || "[]");
let editingId = null;
let marksChart = null;

// Role access
if(userRole !== "faculty" && userRole !== "student"){
  accessDeniedEl.classList.remove("hidden");
  formSection.style.display = "none";
  exportCSVBtn.disabled = true;
  exportPDFBtn.disabled = true;
  filterStudentIdInput.disabled = true;
  filterSubjectInput.disabled = true;
  filterDateInput.disabled = true;
  chartTypeSelector.disabled = true;
  return;
}
if(userRole==="faculty"){formSection.classList.remove("hidden"); actionHeader.classList.remove("hidden");}
if(userRole==="student"){formSection.style.display="none"; actionHeader.classList.add("hidden");}

// Toast
function showToast(msg,d=3000){const t=document.createElement("div");t.className="toast";t.textContent=msg;toastContainer.appendChild(t);setTimeout(()=>t.remove(),d);}

// Save to localStorage
function saveExams(){localStorage.setItem("examsData",JSON.stringify(exams));}

// Reset form
function resetForm(){examForm.reset();editingId=null;submitBtn.textContent="Add Record";cancelEditBtn.classList.add("hidden");}

// Validate form
function validateForm(){
if(!studentIdInput.value.trim()){alert("Student ID required");return false;}
if(!subjectInput.value.trim()){alert("Subject required");return false;}
if(!dateInput.value){alert("Date required");return false;}
if(marksInput.value!==""&&(isNaN(marksInput.value)||marksInput.value<0||marksInput.value>100)){alert("Marks 0-100 or blank");return false;}
return true;
}

// Add/Update
examForm.addEventListener("submit",(e)=>{
e.preventDefault(); if(!validateForm()) return;
const record={id:editingId||Date.now(),studentId:studentIdInput.value.trim(),subject:subjectInput.value.trim(),marks:marksInput.value===""?null:Number(marksInput.value),date:dateInput.value};
if(editingId){const idx=exams.findIndex(ex=>ex.id===editingId);if(idx!==-1){exams[idx]=record;showToast("Record updated")}}else{exams.push(record);showToast("Record added")}
saveExams(); resetForm(); renderTable(); renderChart(); renderAnalytics();
});
cancelEditBtn.addEventListener("click",()=>{resetForm();});

// Table rendering
function renderTable(){
const fid=filterStudentIdInput.value.trim().toLowerCase();
const fsub=filterSubjectInput.value.trim().toLowerCase();
const fdate=filterDateInput.value;
examTableBody.innerHTML="";
let filtered=exams.filter(e=>e.studentId.toLowerCase().includes(fid)&&e.subject.toLowerCase().includes(fsub)&&(fdate?e.date===fdate:true));
if(filtered.length===0){examTableBody.innerHTML=`<tr><td colspan="${userRole==='faculty'?5:4}" class="text-center py-4 text-gray-500">No records found.</td></tr>`;return;}
for(const ex of filtered){
const tr=document.createElement("tr");tr.className="even:bg-gray-50";
const td1=document.createElement("td");td1.className="border px-4 py-2";td1.textContent=ex.studentId;tr.appendChild(td1);
const td2=document.createElement("td");td2.className="border px-4 py-2";td2.textContent=ex.subject;tr.appendChild(td2);
const td3=document.createElement("td");td3.className="border px-4 py-2";td3.textContent=ex.marks===null?"Absent":ex.marks;tr.appendChild(td3);
const td4=document.createElement("td");td4.className="border px-4 py-2";td4.textContent=ex.date;tr.appendChild(td4);
if(userRole==="faculty"){
const tdA=document.createElement("td");tdA.className="border px-4 py-2 space-x-2";
const editBtn=document.createElement("button");editBtn.textContent="Edit";editBtn.className="bg-yellow-400 hover:bg-yellow-500 text-black px-2 py-1 rounded";editBtn.addEventListener("click",()=>{editingId=ex.id;studentIdInput.value=ex.studentId;subjectInput.value=ex.subject;marksInput.value=ex.marks===null?"":ex.marks;dateInput.value=ex.date;submitBtn.textContent="Update Record";cancelEditBtn.classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"});});tdA.appendChild(editBtn);
const delBtn=document.createElement("button");delBtn.textContent="Delete";delBtn.className="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded";delBtn.addEventListener("click",()=>{if(confirm("Delete?")){exams=exams.filter(e=>e.id!==ex.id);saveExams();renderTable();renderChart();renderAnalytics();showToast("Record deleted");if(editingId===ex.id) resetForm();}});tdA.appendChild(delBtn);tr.appendChild(tdA);}
examTableBody.appendChild(tr);}
}

// CSV
function exportCSV(){
if(exams.length===0){alert("No data");return;}
const headers=["Student ID","Subject","Marks","Date"];
const rows=exams.map(e=>[e.studentId,e.subject,e.marks===null?"Absent":e.marks,e.date]);
let csv="data:text/csv;charset=utf-8,"+headers.join(",")+"\n"+rows.map(r=>r.map(f=>`"${f}"`).join(",")).join("\n");
const link=document.createElement("a");link.setAttribute("href",encodeURI(csv));link.setAttribute("download",`examination_records_${new Date().toISOString().slice(0,10)}.csv`);document.body.appendChild(link);link.click();document.body.removeChild(link);
}

// PDF
function exportPDF(){
if(exams.length===0){alert("No data");return;}
const { jsPDF }=window.jspdf;
const doc=new jsPDF();doc.setFontSize(18);doc.text("Examination Records",14,22);
const headers=[["Student ID","Subject","Marks","Date"]];
const data=exams.map(e=>[e.studentId,e.subject,e.marks===null?"Absent":e.marks.toString(),e.date]);
doc.autoTable({startY:30,head:headers,body:data,theme:'striped',headStyles:{fillColor:[59,130,246]},styles:{fontSize:10}});
doc.save(`examination_records_${new Date().toISOString().slice(0,10)}.pdf`);
}

// Chart
function renderChart(){
const filtered=getFilteredExams();
if(marksChart){marksChart.destroy();marksChart=null;}
if(filtered.length===0){marksChartCtx.clearRect(0,0,marksChartCtx.canvas.width,marksChartCtx.canvas.height);return;}
const subMap={};
for(const e of filtered){if(e.marks===null) continue; if(!subMap[e.subject]) subMap[e.subject]={total:0,count:0}; subMap[e.subject].total+=e.marks; subMap[e.subject].count+=1;}
const subjects=Object.keys(subMap);const averages=subjects.map(s=>subMap[s].total/subMap[s].count);
if(subjects.length===0){marksChartCtx.clearRect(0,0,marksChartCtx.canvas.width,marksChartCtx.canvas.height);return;}
marksChart=new Chart(marksChartCtx,{type:chartTypeSelector.value||"bar",data:{labels:subjects,datasets:[{label:'Average Marks',data:averages,backgroundColor:'rgba(59,130,246,0.6)',borderColor:'rgba(59,130,246,1)',borderWidth:1,fill:chartTypeSelector.value==="line"?false:true,pointRadius:chartTypeSelector.value==="line"?5:0,pointHoverRadius:7}]},options:{responsive:true,scales:chartTypeSelector.value==="pie"||chartTypeSelector.value==="radar"?{}:{y:{beginAtZero:true,max:100,ticks:{stepSize:10},title:{display:true,text:'Marks'}},x:{title:{display:true,text:'Subject'}}},plugins:{legend:{display:true,position:'top'},tooltip:{enabled:true}}}});
}

// Filtered exams
function getFilteredExams(){const fid=filterStudentIdInput.value.trim().toLowerCase();const fsub=filterSubjectInput.value.trim().toLowerCase();const fdate=filterDateInput.value;return exams.filter(e=>e.studentId.toLowerCase().includes(fid)&&e.subject.toLowerCase().includes(fsub)&&(fdate?e.date===fdate:true));}

// Analytics
function renderAnalytics(){
const filtered=getFilteredExams();
if(filtered.length===0){analyticsEl.textContent="No data for analytics.";return;}
const marksArr=filtered.map(e=>e.marks).filter(m=>m!==null);
if(marksArr.length===0){analyticsEl.textContent="No marks data (all absent).";return;}
const total=marksArr.reduce((a,b)=>a+b,0);const avg=(total/marksArr.length).toFixed(2);const max=Math.max(...marksArr);const min=Math.min(...marksArr);
analyticsEl.innerHTML=`<p><strong>Records count:</strong> ${filtered.length}</p><p><strong>Marks present:</strong> ${marksArr.length}</p><p><strong>Average Marks:</strong> ${avg}</p><p><strong>Highest Marks:</strong> ${max}</p><p><strong>Lowest Marks:</strong> ${min}</p>`;
}

// Event listeners
filterStudentIdInput.addEventListener("input",()=>{renderTable();renderChart();renderAnalytics();});
filterSubjectInput.addEventListener("input",()=>{renderTable();renderChart();renderAnalytics();});
filterDateInput.addEventListener("change",()=>{renderTable();renderChart();renderAnalytics();});
chartTypeSelector.addEventListener("change",()=>{renderChart();});
exportCSVBtn.addEventListener("click",exportCSV);
exportPDFBtn.addEventListener("click",exportPDF);

// Initial render
renderTable(); renderChart(); renderAnalytics();
})();
</script>
</body>
</html>
