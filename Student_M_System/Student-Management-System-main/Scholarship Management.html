```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scholarship Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.form-control,.form-select{
margin-bottom:15px;
}

.disabled-overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(255,255,255,0.7);
z-index:10;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
color:red;
}

.message{
margin-top:10px;
}

th{
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2 class="text-center mb-4">Scholarship Management</h2>

<div class="position-relative" id="form-wrapper">

<form id="scholarship-form" class="p-4 bg-white rounded shadow-sm border">

<label class="form-label">Scholarship Name</label>
<input type="text" class="form-control" id="scholarship-name" required>

<label class="form-label">Amount (INR)</label>
<input type="number" class="form-control" id="scholarship-amount" required>

<button class="btn btn-primary mt-2">Add Scholarship</button>

<div id="form-message" class="text-success message"></div>

</form>

</div>

<div class="input-group my-4">

<input type="text" class="form-control" id="search-input" placeholder="Search scholarship">

<button class="btn btn-success" onclick="exportToCSV()">Export CSV</button>

</div>

<table class="table table-bordered table-hover" id="scholarship-table">

<thead class="table-dark">

<tr>
<th onclick="sortTable(0)">Scholarship Name</th>
<th onclick="sortTable(1)">Amount (INR)</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script>

const userRole=localStorage.getItem("userRole")||"student"

const form=document.getElementById("scholarship-form")
const formWrapper=document.getElementById("form-wrapper")
const message=document.getElementById("form-message")
const tableBody=document.querySelector("#scholarship-table tbody")

let scholarships=JSON.parse(localStorage.getItem("scholarships"))||[]

loadTable()

if(userRole!=="admin" && userRole!=="faculty"){

const overlay=document.createElement("div")

overlay.className="disabled-overlay"

overlay.innerText="View Only Access"

formWrapper.appendChild(overlay)

form.querySelectorAll("input,button").forEach(el=>el.disabled=true)

}

form.addEventListener("submit",function(e){

e.preventDefault()

const name=document.getElementById("scholarship-name").value.trim()

const amount=document.getElementById("scholarship-amount").value.trim()

if(!name || !amount) return

const data={name,amount}

scholarships.push(data)

localStorage.setItem("scholarships",JSON.stringify(scholarships))

addRow(data)

message.textContent="Scholarship added successfully"

form.reset()

setTimeout(()=>message.textContent="",2000)

})

function loadTable(){

tableBody.innerHTML=""

scholarships.forEach(data=>addRow(data))

}

function addRow(data){

const row=document.createElement("tr")

row.innerHTML=`
<td>${data.name}</td>
<td>${data.amount}</td>
`

tableBody.appendChild(row)

}

document.getElementById("search-input").addEventListener("input",function(){

const value=this.value.toLowerCase()

document.querySelectorAll("#scholarship-table tbody tr").forEach(row=>{

row.style.display=[...row.cells].some(cell=>cell.textContent.toLowerCase().includes(value))?"":"none"

})

})

function sortTable(col){

let rows=[...tableBody.rows]

let asc=true

rows.sort((a,b)=>{

let A=a.cells[col].innerText
let B=b.cells[col].innerText

A=isNaN(A)?A.toLowerCase():Number(A)
B=isNaN(B)?B.toLowerCase():Number(B)

return asc?(A>B?1:-1):(A<B?1:-1)

})

tableBody.innerHTML=""

rows.forEach(r=>tableBody.appendChild(r))

}

function exportToCSV(){

let csv="Scholarship Name,Amount\n"

scholarships.forEach(s=>{

csv+=`${s.name},${s.amount}\n`

})

const blob=new Blob([csv],{type:"text/csv"})

const url=window.URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url

a.download="scholarships.csv"

a.click()

}

</script>

</body>
</html>
