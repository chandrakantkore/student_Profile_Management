<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<script src="https://unpkg.com/feather-icons"></script>

<style>
.dark{
background-color:#1f2937;
color:white;
}

.animate-fadeIn{
animation:fadeIn .5s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>

</head>

<body class="min-h-screen bg-gray-100 transition duration-300">

<!-- HEADER -->

<header class="bg-indigo-600 text-white py-4 shadow">
<div class="container mx-auto px-4 flex justify-between items-center">

<div>
<h1 class="text-xl font-semibold">Student Management Dashboard</h1>
<p id="userInfo" class="text-sm text-indigo-200"></p>
</div>

<div class="flex items-center gap-4">

<label class="flex items-center cursor-pointer">
<span class="mr-2 text-sm">Dark</span>
<input type="checkbox" id="themeToggle">
</label>

<button id="logoutBtn" class="bg-red-500 px-3 py-1 rounded text-sm">
Logout
</button>

</div>

</div>
</header>

<!-- MAIN -->

<main class="container mx-auto px-4 py-8">

<input
id="searchBox"
type="text"
placeholder="Search modules..."
class="w-full md:w-1/2 px-4 py-2 border rounded mb-6"
/>

<h2 class="text-2xl font-bold mb-6">Available Modules</h2>

<div
id="modulesContainer"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
</div>

</main>

<script>

const modules=[

{title:"Admission Section",roles:["student","faculty","parent"],href:"Admission.html",description:"Manage admissions"},

{title:"Attendance Management",roles:["student","faculty","parent"],href:"Attendance.html",description:"Track attendance"},

{title:"Event Management",roles:["student","faculty","parent","alumni"],href:"Events.html",description:"Manage events"},

{title:"Library Management",roles:["student","faculty"],href:"Library.html",description:"Library system"},

{title:"Result Processing",roles:["student","faculty","parent"],href:"Results.html",description:"Academic results"},

{title:"Time Table Section",roles:["student","faculty","parent"],href:"Timetable.html",description:"View schedule"}

];

const loggedInUser=JSON.parse(localStorage.getItem("loggedInUser"));

if(!loggedInUser){
alert("Login First");
window.location.href="login.html";
}

document.getElementById("userInfo").textContent=
`Welcome ${loggedInUser.fullName || "User"} (${loggedInUser.role})`;

const container=document.getElementById("modulesContainer");
const searchBox=document.getElementById("searchBox");

function renderModules(filter=""){

container.innerHTML="";

modules.forEach(mod=>{

if(mod.roles.includes(loggedInUser.role)
&& mod.title.toLowerCase().includes(filter.toLowerCase())){

const card=document.createElement("a");

card.href=mod.href;

card.className=
"animate-fadeIn p-5 bg-white rounded-xl shadow hover:bg-indigo-50 block";

card.innerHTML=`
<h3 class="font-semibold text-indigo-600">
${mod.title}
</h3>

<p class="text-sm text-gray-600 mt-2">
${mod.description}
</p>
`;

container.appendChild(card);

}

});

}

searchBox.addEventListener("input",(e)=>{
renderModules(e.target.value);
});

document.getElementById("logoutBtn").addEventListener("click",()=>{
localStorage.clear();
window.location.href="login.html";
});

const toggle=document.getElementById("themeToggle");

toggle.addEventListener("change",()=>{
document.body.classList.toggle("dark");
});

renderModules();

if(window.feather){
feather.replace();
}

</script>

</body>
</html>
