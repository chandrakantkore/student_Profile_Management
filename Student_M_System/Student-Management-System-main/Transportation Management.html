<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transportation Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9fa;
padding:20px;
}

.container{
max-width:900px;
}

.disabled-overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(255,255,255,0.8);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:red;
z-index:10;
}

.message{
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2 class="text-center mb-4">Transportation Management</h2>

<div class="position-relative" id="form-wrapper">

<form id="transport-form" class="bg-white p-4 rounded shadow border">

<div class="row g-3">

<div class="col-md-4">
<label class="form-label">Student ID</label>
<input type="text" id="studentId" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Route</label>
<input type="text" id="route" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Vehicle No</label>
<input type="text" id="vehicleNo" class="form-control" required>
</div>

</div>

<button class="btn btn-primary mt-3">Assign Transport</button>

<div id="msg" class="text-success message"></div>

</form>

</div>

<div class="input-group my-4">

<input type="text" id="search" class="form-control"
placeholder="Search Student / Route / Vehicle">

<button class="btn btn-success" onclick="exportCSV()">
Export CSV
</button>

</div>

<table class="table table-bordered table-hover" id="table">

<thead class="table-dark">

<tr>
<th onclick="sortTable(0)">Student ID</th>
<th onclick="sortTable(1)">Route</th>
<th onclick="sortTable(2)">Vehicle No</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script>

const role = localStorage.getItem("userRole") || "student"

const form=document.getElementById("transport-form")
const wrapper=document.getElementById("form-wrapper")

if(role!=="admin" && role!=="staff"){

const overlay=document.createElement("div")

overlay.className="disabled-overlay"
overlay.innerText="View Only Mode (Login as Admin/Staff)"

wrapper.appendChild(overlay)

form.querySelectorAll("input,button").forEach(el=>el.disabled=true)

}

form.addEventListener("submit",function(e){

e.preventDefault()

const id=document.getElementById("studentId").value
const route=document.getElementById("route").value
const vehicle=document.getElementById("vehicleNo").value

const row=document.createElement("tr")

row.innerHTML=`
<td>${id}</td>
<td>${route}</td>
<td>${vehicle}</td>
`

document.querySelector("#table tbody").appendChild(row)

document.getElementById("msg").innerText="Transport Assigned"

form.reset()

setTimeout(()=>{
document.getElementById("msg").innerText=""
},2000)

})

document.getElementById("search").addEventListener("input",function(){

let value=this.value.toLowerCase()

document.querySelectorAll("#table tbody tr").forEach(row=>{

row.style.display=[...row.cells].some(cell=>
cell.innerText.toLowerCase().includes(value)
)?"":"none"

})

})

function sortTable(n){

const table=document.getElementById("table")
const tbody=table.tBodies[0]

const rows=[...tbody.rows]

rows.sort((a,b)=>{

let A=a.cells[n].innerText.toLowerCase()
let B=b.cells[n].innerText.toLowerCase()

return A>B?1:-1

})

tbody.append(...rows)

}

function exportCSV(){

let rows=document.querySelectorAll("table tr")

let csv=[...rows].map(row=>
[...row.cells].map(cell=>cell.innerText).join(",")
).join("\n")

let blob=new Blob([csv],{type:"text/csv"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url
a.download="transport_data.csv"

a.click()

}

</script>

</body>
</html>
